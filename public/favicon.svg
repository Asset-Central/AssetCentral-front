<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="8" fill="#1e1b4b"/>

  <!-- Barras de gráfico -->
  <rect x="5"  y="18" width="4" height="9"  rx="1.5" fill="#4f46e5" opacity="0.6"/>
  <rect x="11" y="13" width="4" height="14" rx="1.5" fill="#6366f1" opacity="0.8"/>
  <rect x="17" y="8"  width="4" height="19" rx="1.5" fill="#818cf8"/>

  <!-- Línea de tendencia -->
  <polyline
    points="7,17 13,11 19,7 25,4"
    stroke="#a5b4fc"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Punto final de la línea -->
  <circle cx="25" cy="4" r="2" fill="#c7d2fe"/>
</svg>
